name: Deploy to Staging

on:
  push:
    branches: [main, 'epic/**']

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@63da3ecc5e2793b98a3f2519b3d75d4f4c11cec2
      - run: flyctl deploy --config fly.api.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-frontend:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@63da3ecc5e2793b98a3f2519b3d75d4f4c11cec2
      - run: cd ui-nextjs && flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-crawl4ai:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@63da3ecc5e2793b98a3f2519b3d75d4f4c11cec2
      - run: flyctl deploy --config fly.crawl4ai.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-searxng:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@63da3ecc5e2793b98a3f2519b3d75d4f4c11cec2
      - run: flyctl deploy --config fly.searxng.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  health-check:
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-frontend, deploy-crawl4ai, deploy-searxng]
    steps:
      - name: Wait for deployment
        run: sleep 30
      - name: Check API health
        run: curl --fail --retry 5 --retry-delay 10 https://d4bl-api.fly.dev/api/health
      - name: Check frontend
        run: curl --fail --retry 5 --retry-delay 10 https://d4bl-frontend.fly.dev/
      - name: Check SearXNG health
        run: curl --fail --retry 5 --retry-delay 10 https://d4bl-searxng.fly.dev/healthz
