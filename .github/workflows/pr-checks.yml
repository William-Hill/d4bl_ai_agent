name: PR Checks

on:
  pull_request:
    branches: [main, 'epic/**']

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: pip install -e ".[test]" ruff
      - name: Lint
        run: ruff check src/ tests/
      - name: Tests
        run: pytest tests/ -v --tb=short
        env:
          PYTHONPATH: src

  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui-nextjs/package-lock.json
      - name: Install dependencies
        run: cd ui-nextjs && npm ci
      - name: Lint
        run: cd ui-nextjs && npm run lint
      - name: Type check
        run: cd ui-nextjs && npx tsc --noEmit
      - name: Build
        run: cd ui-nextjs && npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t d4bl-api:test .
      - name: Smoke test backend image
        run: docker run --rm d4bl-api:test python -c "from d4bl.app.api import app; print('OK')"
      - name: Build frontend image
        run: docker build -t d4bl-frontend:test ./ui-nextjs
      - name: Smoke test frontend image
        run: docker run --rm d4bl-frontend:test node -e "require('./server.js'); process.exit(0)" || true
