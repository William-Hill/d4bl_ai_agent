# docker-compose.dagster.yml
# Usage: docker compose -f docker-compose.base.yml -f docker-compose.dagster.yml up --build
services:
  dagster-webserver:
    build:
      context: .
      dockerfile: dagster/Dockerfile
    ports:
      - "3003:8080"
    environment:
      DAGSTER_POSTGRES_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      POSTGRES_DB: "${POSTGRES_DB:-postgres}"
      SUPABASE_JWT_SECRET: "${SUPABASE_JWT_SECRET:-}"
      SUPABASE_URL: "${SUPABASE_URL:-}"
      SUPABASE_ANON_KEY: "${SUPABASE_ANON_KEY:-}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY:-}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - d4bl-network

  dagster-daemon:
    build:
      context: ./dagster
      dockerfile: Dockerfile
    command: dagster-daemon run
    environment:
      DAGSTER_POSTGRES_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      POSTGRES_DB: "${POSTGRES_DB:-postgres}"
    depends_on:
      dagster-webserver:
        condition: service_started
    networks:
      - d4bl-network
