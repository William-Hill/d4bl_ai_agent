app = "d4bl-frontend"
primary_region = "iad"

[build]
  dockerfile = "ui-nextjs/Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.checks]
    [http_service.checks.health]
      interval = "15s"
      timeout = "5s"
      grace_period = "10s"
      method = "GET"
      path = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
